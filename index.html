<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Primary Meta Tags -->
  <title>TrippyCrush - Group Travel Experiences for 18-35s</title>
  <meta name="title" content="TrippyCrush - Group Travel Experiences for 18-35s" />
  <meta name="description"
    content="Join verified group trips for 18-35s. Curated itineraries, local guides, and stress-free travel across the Mediterranean and beyond. Plan your crush with TrippyCrush." />
  <meta name="keywords"
    content="group travel, 18-35 travel, adventure tours, curated itineraries, Mediterranean travel, TrippyCrush" />
  <meta name="author" content="TrippyCrush" />
  <meta name="application-name" content="TrippyCrush" />

  <!-- Favicon / Icons -->
  <link rel="icon" type="image/jpeg" href="/images/logo.jpeg" />
  <link rel="apple-touch-icon" href="/images/logo.jpeg" />
  <meta name="apple-mobile-web-app-title" content="TrippyCrush" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://trippycrush.com/" />
  <meta property="og:site_name" content="TrippyCrush" />
  <meta property="og:title" content="TrippyCrush - Group Travel Experiences" />
  <meta property="og:description"
    content="Join verified group trips for 18-35s. Curated itineraries, local guides, and stress-free travel." />
  <meta property="og:image" content="/images/logo.jpeg" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:url" content="https://trippycrush.com/" />
  <meta name="twitter:title" content="TrippyCrush - Group Travel Experiences" />
  <meta name="twitter:description"
    content="Join verified group trips for 18-35s. Curated itineraries, local guides, and stress-free travel." />
  <meta name="twitter:image" content="/images/logo.jpeg" />

  <!-- JSON-LD Structured Data -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TrippyCrush",
      "url": "https://trippycrush.com/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://trippycrush.com/?s={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
  </script>
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "TrippyCrush",
      "url": "https://trippycrush.com/",
      "logo": "https://trippycrush.com/images/logo.jpeg",
      "sameAs": [
        "https://www.instagram.com/trippy_crush"
      ]
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lobster&family=Pacifico&display=swap');
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
